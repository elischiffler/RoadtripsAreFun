name: Backend CI

on:
  pull_request:
    paths:
      - "backend/**"
  push:
    branches:
      - main
    paths:
      - "backend/**"

jobs:
  test:
    name: Run pytest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          MAPBOX_API: ${{ secrets.MAPBOX_API }}
          TRIPADVISOR_API: ${{ secrets.TRIPADVISOR_API }}
          GOOGLE_PLACES_API: ${{ secrets.GOOGLE_PLACES_API }}
          OPENCAGE_KEY: ${{ secrets.OPENCAGE_KEY }}
          AMADEUS_KEY: ${{ secrets.AMADEUS_KEY }}
          AMADEUS_SECRET: ${{ secrets.AMADEUS_SECRET }}
        run: pytest
