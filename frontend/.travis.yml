dist: xenial

language: node_js
node_js:
  - node
install:
  - npm ci
script:
  - npm run build
deploy:
  provider: pages
  cleanup: true
  local_dir: dist
  keep_history: true
  on:
    branch: main

# Run builds only on PRs
if: type = pull_request

# Notifications (optional)
notifications:
  email:
    recipients:
      - joeymarenin13@gmail.com
      - eschiffler1122@gmail.com
      - apfreela@calpoly.edu

    on_success: change
    on_failure: always
