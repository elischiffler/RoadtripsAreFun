<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="32" fill="#FBF8F3"/>

  <!-- Mountain back -->
  <polygon points="8,46 24,18 40,46" fill="#D9C4A8"/>

  <!-- Mountain front -->
  <polygon points="26,46 44,22 62,46" fill="#C4A882"/>

  <!-- Road -->
  <rect x="0" y="44" width="64" height="8" rx="2" fill="#7A5C44" opacity="0.4"/>
  <!-- Road dashes -->
  <rect x="4"  y="47" width="8" height="2" rx="1" fill="#FBF8F3" opacity="0.8"/>
  <rect x="20" y="47" width="8" height="2" rx="1" fill="#FBF8F3" opacity="0.8"/>
  <rect x="36" y="47" width="8" height="2" rx="1" fill="#FBF8F3" opacity="0.8"/>
  <rect x="52" y="47" width="8" height="2" rx="1" fill="#FBF8F3" opacity="0.8"/>

  <!-- Car body -->
  <rect x="14" y="34" width="28" height="10" rx="2.5" fill="#C4873A"/>
  <!-- Car cabin -->
  <rect x="20" y="26" width="16" height="10" rx="2.5" fill="#9E6420"/>
  <!-- Windows -->
  <rect x="21" y="27" width="6" height="8" rx="1.5" fill="#FBF8F3" opacity="0.65"/>
  <rect x="29" y="27" width="6" height="8" rx="1.5" fill="#FBF8F3" opacity="0.65"/>
  <!-- Headlight -->
  <rect x="40" y="37" width="3" height="2" rx="0.5" fill="#fff8c0"/>

  <!-- Rear wheel -->
  <circle cx="20" cy="45" r="5" fill="#3B2A1A" stroke="#7A5C44" stroke-width="0.5"/>
  <circle cx="20" cy="45" r="1.8" fill="#D9A55E"/>
  <!-- Rear spokes -->
  <line x1="20" y1="40.2" x2="20" y2="49.8" stroke="#7A5C44" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="15.2" y1="45" x2="24.8" y2="45" stroke="#7A5C44" stroke-width="1.2" stroke-linecap="round"/>

  <!-- Front wheel -->
  <circle cx="36" cy="45" r="5" fill="#3B2A1A" stroke="#7A5C44" stroke-width="0.5"/>
  <circle cx="36" cy="45" r="1.8" fill="#D9A55E"/>
  <!-- Front spokes -->
  <line x1="36" y1="40.2" x2="36" y2="49.8" stroke="#7A5C44" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="31.2" y1="45" x2="40.8" y2="45" stroke="#7A5C44" stroke-width="1.2" stroke-linecap="round"/>
</svg>
