language: python
python:
  - "3.9"

# Cache pip dependencies
cache: pip

# Install dependencies
install:
  - pip install -r requirements.txt
  - pip install pytest

before_script:
  - cd tests

# Command to run tests
script:
  - pytest main_tests.py
  - pytest routing_api_tests.py

# Run builds only on PRs
if: type = pull_request
