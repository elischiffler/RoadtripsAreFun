version: 0.2

phases:
  install:
    runtime-versions:
      python: 3.9  # Specify the Python version to use
    commands:
      - echo "Installing dependencies..."
      - pip install --upgrade pip
      - pip install -r requirements.txt

  pre_build:
    commands:
      - echo "Running pre-build phase..."
      - python -m unittest discover tests  # Run tests (optional)

  build:
    commands:
      - echo "Building application..."

  post_build:
    commands:
      - echo "Post build actions..."

artifacts:
  files:
    - '**/*'

cache:
  paths:
    - 'pip'

